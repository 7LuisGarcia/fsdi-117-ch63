{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static '/css/style.css' %}">
</head>

<body class="bg-light">

    <!-- PAGE WRAPPER MUST WRAP EVERYTHING -->
    <div class="page-wrapper">

        <!-- Navigation -->
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
                <div class="container">
                    <a class="navbar-brand fw-bold" href="/">My Portfolio</a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarNav" aria-controls="navbarNav"
                            aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link {% block nav_about %}{% endblock %}" href="/about_me">About Me</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% block nav_exp %}{% endblock %}" href="/experience">Experience</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% block nav_projects %}{% endblock %}" href="/projects">Projects</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% block nav_contact %}{% endblock %}" href="/contact">Contact</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="container py-4 content">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="footer-custom text-center py-3">
            <div class="container">
            © Luis Garcia — All Rights Reserved
            </div>
        </footer>

    </div> <!-- END OF PAGE WRAPPER -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
